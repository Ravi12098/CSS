<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        body{
            background: whitesmoke;
            padding: 40px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            }
            
        
        
        .container{
            background: white;
            padding: 10px;
            border: 0.5px solid rgb(218, 212, 212);
            border-radius: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 150px 150px;
            gap: 10px;
        }

        .item{
            background: turquoise;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 10px;

        }

        .item:nth-child(2) {
            background: rgb(56, 132, 125);
        
        }
        .item:nth-child(3) {
            background: rgb(46, 97, 93);
        
        }
        .item:nth-child(4) {
            background: rgb(44, 75, 73);
            
        }
        .item:nth-child(5) {
            background: rgb(31, 49, 47);
        }
    </style>
</head>
<body>
    <h1>Grid Container (display:grid:)</h1>

    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>

    </div>
    
</body>
</html>
