<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .block{
            display: block;
            background-color: aqua;
            padding: 20px;
            margin: 5px;

        }

        .inline{
            display: inline;
            background-color: rgb(50, 50, 172);
            padding: 20px;
            margin: 5px;
        }

        .Inline-block{
            display: inline-block;
            background-color: blueviolet;
            padding: 20px;
            margin: 5px;
            width: 100px;
            height: 50px;
            border: 5px coral solid;
        }

        h2{
            display: block;
            background-color: darkgoldenrod;
            text-align: center;
            
        }
    </style>
</head>
<body>
    <h2>Display Block</h2>
    <div class="block">Box1 </div>
    <div class="block">Box2 </div>
    <p>Each block takes the full line, so nextline</p>

    <h2>Display Inline</h2>
    <div class="inline">Word1</div>
    <div class="inline">Word2</div>
    <div class="inline">Word3</div>
    <p>Inline boxes sit side by side</p>

    <h2>Display Inline-block</h2>
    <div class="Inline-block">Box A</div>
    <div class="Inline-block">Box B</div>
    <div class="Inline-block">Box C</div>
    <p>Inline-block boxes sit next to each other but keep width and height like real boxes</p>

    
</body>
</html>
