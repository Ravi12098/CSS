<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body{
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
        }

        nav{
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .nav-content{
            width: 90%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        
        }
        .logo{
            font-size: 22px;
            font-weight: bold;
        
        }

        .menu{
            display: flex;
            flex: 1;
            justify-content: center;
            gap: 30px;

        }

        .menu a{
            text-decoration: none;
            color: #333;
            font-size: 15px;
            letter-spacing: 0.1px;
            padding: 10px 0;
        }

        .menu a:hover{
            color: #0071e3;
        }

        .buttons{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-blue{
            background: #0071e3;
            color: white;
            padding: 8px 20px;
            font-size: 13px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            transition: 0.3s;
            
        }
        .btn-blue:hover{
            opacity: 0.8;
        }

        .btn-black{
            background: #1d1d1f;
            color: white;
            padding: 8px 20px;
            font-size: 13px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin: 0 5px;
            transition: 0.3s;
        }

        .btn-black:hover{
            color: cadetblue;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo">⭐</div>

            
            <div class="menu">
                <a href="http://" target="_blank" rel="noopener noreferrer">Store</a>
                <a href="http://" target="_blank" rel="noopener noreferrer">Mac</a>
                <a href="http://" target="_blank" rel="noopener noreferrer">iPad</a>
                <a href="http://" target="_blank" rel="noopener noreferrer">iPhone</a>
                <a href="http://" target="_blank" rel="noopener noreferrer">Macbook</a>
                <a href="http://" target="_blank" rel="noopener noreferrer">Support</a>
            </div>

            <div class="buttons">
                <button class="btn-blue">Buy</button>
                <button class="btn-black">Login</button>
            </div>

        </div>
    </nav>
    
</body>
</html>
