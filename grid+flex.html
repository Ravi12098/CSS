<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid+flex</title>
    <style>
        body{
            background: #eee;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 40px;
        }

        .product-grid{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 40px;
        }

        .card{
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
        transform: translateY(-5px);
        }

        .price{
            font-size: large;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            padding: 10px;
        }

        button{
            border-radius: 5px;
            border: none;
            color: white;
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-blue{
            background: rgb(62, 62, 190);
        }

        .btn-black{
            background: black;
        }

        .card img {
        width: 100%;
        height: 200px;
        object-fit: contain;
        margin-bottom: 15px;
        }

        .button-group {
        display: flex; /* Buttons side-by-side karne ke liye */
        gap: 10px;
        width: 100%;
        justify-content: center;
    }

    </style>
</head>
<body>
    <h1>Products</h1>
    <div class="product-grid">
        <div class="card">
            <img src="https://tse1.mm.bing.net/th/id/OIP.bZWQhFbP2Fq_IQOKpg9iZwHaHa?pid=Api&P=0&h=180" alt="">
            <div class="price">$999</div>
            <div class="button-group">
                <button class="btn-blue">Buy</button>
            <button class="btn-black">Info</button>
            </div>
        </div>

        <div class="card">
            <img src="https://tse3.mm.bing.net/th/id/OIP.p1Hje30xalZEb4tqwICJ5AHaJD?pid=Api&P=0&h=180" alt="">
            <div class="price">$1999</div>
            <div class="button-group">
                <button class="btn-blue">Buy</button>
                <button class="btn-black">Info</button>
            </div>    
        </div>

        <div class="card">
            <img src="https://tse3.mm.bing.net/th/id/OIP.YlkPnyrR-5lmOuoMvTEGtQHaJh?pid=Api&P=0&h=180" alt="">
            <div class="price">$2999</div>
           <div class="button-group">
               <button class="btn-blue">Buy</button>
               <button class="btn-black">Info</button>
           </div> 
        </div>
    </div>
</body>
</html>
