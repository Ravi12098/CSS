<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
            background-color: #f3f4f6;
        }

        h1{
            margin-bottom: 20px;
        }

        .wrapper{
            display: flex;
            gap: 40px;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .demo{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            width: 45%;
        }

        .container{
            border: 2px solid #000;
            height: 250px;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            background: #ffffff;
        }

        .item{
            background: #90edef;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            font-size: 22px;
            text-align: center;
            width: 60px;
        }

        .item:nth-child(2){
            background: #64bfc1;
        }

        .item:nth-child(3){
            background: #1e5e5f;
        }
    </style>
</head>
<body>
    <h1>Flexbox: Main axis vs Cross axis</h1>
    <div class="wrapper">
        <div class="demo">
            <div class="label">Main axis = Row(Default)</div>
            <div class="arrow">Main Axis direction - left to right</div>
            <div class="arrow">Cross Axis direction - top to bottom</div>
            <div class="container" 
            style="justify-content: center; align-items: center;">
                <div class="item">A</div>
                <div class="item">B</div>
                <div class="item">C</div>
            </div>
        </div>

        <div class="demo">
            <div class="label">Main axis = Column(flex-direction:column;)</div>
            <div class="arrow">Main Axis direction - lop to bottom</div>
            <div class="arrow">Cross Axis direction - left to right</div>
            <div class="container"
            style="flex-direction: column; justify-content: center; align-items: center;">
                <div class="item">A</div>
                <div class="item">B</div>
                <div class="item">C</div>
            </div>
        </div> 

    </div>
</body>
</html>
